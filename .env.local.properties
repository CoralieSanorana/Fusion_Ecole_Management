# Configuration lancée automatiquement par Maven au démarrage local
# Ce fichier se copie dans target/classes/application.properties
# Il écrase le profil par défaut et force le profil 'local'

# Force Spring à activer le profil local
spring.profiles.active=local

# Annule les paramètres problématiques du profile par défaut
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=false
