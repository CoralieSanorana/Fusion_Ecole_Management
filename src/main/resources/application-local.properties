# ============================================
# Configuration locale (profil 'local')
# ============================================
# Cette configuration est utilisée uniquement en développement local
# Elle n'affecte pas le repository Git

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration HikariCP optimisée
# - max-lifetime : 30 min (garde les connexions longtemps)
# - idle-timeout : 10 min
# - connection-test-query : valide la connexion avant utilisation
# - leak-detection-threshold : détecte les fuites
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
# MODE: none = pas de validation ni de modification du schéma
# Le schéma est déjà créé via les scripts SQL et géré externalement
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Évite Hibernate d'essayer d'inspecter les méta-données du schéma
spring.jpa.properties.hibernate.generate_statistics=false
# Désactiver le cache au démarrage pour éviter l'introspection
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Désactiver l'initialisation automatique des données
# (évite les conflits lors des migrations)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
