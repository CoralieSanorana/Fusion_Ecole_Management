<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Mes Notes</h2>
        <p th:text="${periodeSelectionnee != null
            ? periodeSelectionnee.libelle + ' — ' + periodeSelectionnee.dateDebut.year + '/' + periodeSelectionnee.dateFin.year
            : 'Aucune période disponible'}"></p>
      </div>
      <form method="get" action="/etudiant/notes" style="display:inline;">
        <select name="periodeId" class="form-control" style="width:auto;padding:8px 12px;"
                onchange="this.form.submit()">
          <option th:each="p : ${periodes}"
                  th:value="${p.id}"
                  th:text="${p.libelle}"
                  th:selected="${periodeSelectionnee != null and p.id == periodeSelectionnee.id}">
          </option>
        </select>
      </form>
    </div>

    <div class="card" style="margin-bottom:var(--sp-lg);">
      <div class="card-header">
        <h3>Filtres</h3>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--sp-md);align-items:end;">
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Matière</label>
            <input id="filter-matiere" class="form-control" type="text" placeholder="Ex: Maths" oninput="filterNotes()">
          </div>
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Professeur</label>
            <input id="filter-professeur" class="form-control" type="text" placeholder="Nom du prof" oninput="filterNotes()">
          </div>
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Moyenne min</label>
            <input id="filter-min" class="form-control" type="number" min="0" max="20" step="0.1" placeholder="0" oninput="filterNotes()">
          </div>
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Moyenne max</label>
            <input id="filter-max" class="form-control" type="number" min="0" max="20" step="0.1" placeholder="20" oninput="filterNotes()">
          </div>
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Coefficient</label>
            <input id="filter-coeff" class="form-control" type="number" min="0" step="0.5" placeholder="Ex: 2" oninput="filterNotes()">
          </div>
          <div>
            <label style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);display:block;margin-bottom:6px;">Appréciation</label>
            <input id="filter-appreciation" class="form-control" type="text" placeholder="Ex: Bien" oninput="filterNotes()">
          </div>
          <button type="button" class="btn btn-secondary" onclick="resetNoteFilters()">
            <i class="fas fa-rotate-left"></i> Réinitialiser
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h3>Détail par matière</h3>
        <span style="font-size:12px;color:var(--txt3);">
          <i class="fas fa-chevron-down" style="margin-right:4px;"></i>
          Cliquez sur une ligne pour voir le détail des notes
        </span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Matière</th>
              <th>Professeur</th>
              <th>Moyenne /20</th>
              <th>Coeff.</th>
              <th>Appréciation</th>
            </tr>
          </thead>
          <tbody>

            <!-- Cas : aucune note -->
            <tr th:if="${notesGroupees == null or notesGroupees.isEmpty()}">
              <td colspan="6" style="text-align:center;color:var(--txt2);padding:24px;">
                Aucune note disponible pour cette période.
              </td>
            </tr>

            <!-- Une ligne par matière + sous-lignes de détail -->
            <th:block th:each="groupe, stat : ${notesGroupees}">

              <!-- Ligne principale (cliquable) -->
              <tr class="row-matiere"
                  th:data-detail-id="|detail-${stat.index}|"
                  th:data-matiere="${#strings.toLowerCase(groupe.matiereNom)}"
                  th:data-professeur="${#strings.toLowerCase(groupe.professeur)}"
                  th:data-moyenne="${groupe.moyenne}"
                  th:data-coeff="${groupe.coefficient}"
                  th:data-appreciation="${#strings.toLowerCase(groupe.appreciation)}"
                  th:onclick="|toggleDetail('detail-' + ${stat.index})|"
                  style="cursor:pointer;">
                <td style="width:36px;text-align:center;">
                  <i class="fas fa-chevron-right chevron-icon"
                     th:id="|chevron-${stat.index}|"
                     style="font-size:11px;color:var(--txt3);transition:transform .2s;"></i>
                </td>
                <td style="font-weight:600;" th:text="${groupe.matiereNom}">Matière</td>
                <td th:text="${groupe.professeur}">Professeur</td>
                <td>
                  <span th:class="${groupe.cssClass}"
                        th:text="${#numbers.formatDecimal(groupe.moyenne, 1, 'COMMA', 2, 'POINT')}">
                    0.00
                  </span>
                </td>
                <td th:text="${groupe.coefficient}">1</td>
                <td th:text="${groupe.appreciation}">Bien</td>
              </tr>

              <!-- Sous-lignes de détail (masquées par défaut) -->
              <tr th:id="|detail-${stat.index}|" class="row-detail" style="display:none;">
                <td colspan="6" style="padding:0;">
                  <table style="width:100%;background:var(--sidebar-bg, #f8f9fa);">
                    <thead>
                      <tr style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;">
                        <td style="width:36px;"></td>
                        <td style="padding:8px 16px;">Type d'évaluation</td>
                        <td style="padding:8px 16px;">Note /20</td>
                        <td colspan="3" style="padding:8px 16px;">Appréciation</td>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="detail : ${groupe.details}"
                          style="border-top:1px solid var(--border);font-size:13px;">
                        <td style="width:36px;"></td>
                        <td style="padding:8px 16px;text-transform:capitalize;"
                            th:text="${detail.typeEvaluation}">Type</td>
                        <td style="padding:8px 16px;">
                          <span th:class="${detail.cssClass}"
                                th:text="${#numbers.formatDecimal(detail.valeur, 1, 'COMMA', 2, 'POINT')}">
                            0.00
                          </span>
                        </td>
                        <td colspan="3" style="padding:8px 16px;color:var(--txt3);"
                            th:text="${detail.appreciation}">Bien</td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>

            </th:block>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<style>
  .row-matiere:hover { background: var(--hover, rgba(0,0,0,.04)) !important; }
  .row-detail td { border-bottom: 2px solid var(--primary, #4f46e5); }
  .chevron-icon.open { transform: rotate(90deg); }
</style>

<script>
function normalizeText(value) {
  return (value || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function parseFilterNumber(id) {
  const value = document.getElementById(id)?.value;
  return value === '' || value == null ? null : Number(value);
}

function filterNotes() {
  const matiere = normalizeText(document.getElementById('filter-matiere')?.value);
  const professeur = normalizeText(document.getElementById('filter-professeur')?.value);
  const appreciation = normalizeText(document.getElementById('filter-appreciation')?.value);
  const min = parseFilterNumber('filter-min');
  const max = parseFilterNumber('filter-max');
  const coeff = parseFilterNumber('filter-coeff');

  document.querySelectorAll('.row-matiere').forEach(row => {
    const rowMatiere = normalizeText(row.dataset.matiere);
    const rowProfesseur = normalizeText(row.dataset.professeur);
    const rowAppreciation = normalizeText(row.dataset.appreciation);
    const rowMoyenne = Number((row.dataset.moyenne || '0').replace(',', '.'));
    const rowCoeff = Number((row.dataset.coeff || '0').replace(',', '.'));

    const visible =
      (!matiere || rowMatiere.includes(matiere)) &&
      (!professeur || rowProfesseur.includes(professeur)) &&
      (!appreciation || rowAppreciation.includes(appreciation)) &&
      (min === null || rowMoyenne >= min) &&
      (max === null || rowMoyenne <= max) &&
      (coeff === null || rowCoeff === coeff);

    row.style.display = visible ? 'table-row' : 'none';

    const detail = document.getElementById(row.dataset.detailId);
    if (detail && !visible) {
      detail.style.display = 'none';
      const index = row.dataset.detailId.split('-')[1];
      document.getElementById('chevron-' + index)?.classList.remove('open');
    }
  });
}

function resetNoteFilters() {
  ['filter-matiere', 'filter-professeur', 'filter-min', 'filter-max', 'filter-coeff', 'filter-appreciation']
    .forEach(id => {
      const input = document.getElementById(id);
      if (input) input.value = '';
    });
  filterNotes();
}

function toggleDetail(id) {
  const row   = document.getElementById(id);
  const index = id.split('-')[1];
  const icon  = document.getElementById('chevron-' + index);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'table-row';
  icon.classList.toggle('open', !isOpen);
}
</script>

</body>
</html>
