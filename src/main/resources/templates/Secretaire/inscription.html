<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">

    <div th:if="${successMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;color:#065f46;">
      <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div class="page-header">
      <div>
        <h2>Inscription — Nouvel Élève</h2>
        <p>Enregistrer un élève qui n'a jamais été inscrit dans l'établissement</p>
      </div>
    </div>

    <div class="card" style="max-width:800px;">
      <div class="card-header"><h3><i class="fas fa-user-plus"></i> Formulaire d'inscription</h3></div>
      <div class="card-body">
        <form th:action="@{/secretariat/inscription}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <h4 style="margin-bottom:var(--sp-md);color:var(--g);font-size:14px;text-transform:uppercase;letter-spacing:0.5px;">Informations de l'élève</h4>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Prénom <span style="color:var(--danger);">*</span></label>
              <input type="text" name="prenom" class="form-control" placeholder="Miora" required/>
            </div>
            <div class="form-group">
              <label>Nom <span style="color:var(--danger);">*</span></label>
              <input type="text" name="nom" class="form-control" placeholder="Andria" required/>
            </div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Date de naissance</label>
              <input type="date" name="dateNaissance" class="form-control"/>
            </div>
            <div class="form-group">
              <label>Sexe</label>
              <select name="sexe" class="form-control">
                <option value="">— Non précisé —</option>
                <option value="M">Masculin</option>
                <option value="F">Féminin</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Lieu de naissance</label>
              <input type="text" name="lieuNaissance" class="form-control" placeholder="Antananarivo"/>
            </div>
            <div class="form-group">
              <label>Nationalité</label>
              <input type="text" name="nationalite" class="form-control" value="Malgache"/>
            </div>
          </div>
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" name="adresse" class="form-control" placeholder="Lot 24, …"/>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Quartier / Commune</label>
              <input type="text" name="commune" class="form-control" placeholder="Tsaralalàna"/>
            </div>
            <div class="form-group">
              <label>Téléphone élève</label>
              <input type="tel" name="telephone" class="form-control" placeholder="034 XX XXX XX"/>
            </div>
          </div>

          <hr style="margin:var(--sp-lg) 0;border-color:var(--border);"/>

          <h4 style="margin-bottom:var(--sp-md);color:var(--g);font-size:14px;text-transform:uppercase;letter-spacing:0.5px;">Inscription scolaire</h4>
          <div class="form-group">
            <label>Classe <span style="color:var(--danger);">*</span></label>
            <select name="classeId" class="form-control" required>
              <option value="">— Choisir une classe —</option>
              <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.nom}"></option>
            </select>
          </div>

          <hr style="margin:var(--sp-lg) 0;border-color:var(--border);"/>

          <h4 style="margin-bottom:var(--sp-md);color:var(--g);font-size:14px;text-transform:uppercase;letter-spacing:0.5px;">Parent / Tuteur</h4>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Prénom parent</label>
              <input type="text" name="prenomParent" class="form-control" placeholder="Pierre"/>
            </div>
            <div class="form-group">
              <label>Nom parent</label>
              <input type="text" name="nomParent" class="form-control" placeholder="Andria"/>
            </div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-md);">
            <div class="form-group">
              <label>Téléphone parent</label>
              <input type="tel" name="telephoneParent" class="form-control" placeholder="034 XX XXX XX"/>
            </div>
            <div class="form-group">
              <label>Lien de parenté</label>
              <select name="lienParente" class="form-control">
                <option value="père">Père</option>
                <option value="mère">Mère</option>
                <option value="tuteur">Tuteur</option>
                <option value="autre">Autre</option>
              </select>
            </div>
          </div>

          <div style="margin-top:var(--sp-lg);display:flex;gap:var(--sp-md);justify-content:flex-end;">
            <a th:href="@{/secretariat/eleves}" class="btn btn-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Inscrire l'élève
            </button>
          </div>
        </form>
      </div>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
