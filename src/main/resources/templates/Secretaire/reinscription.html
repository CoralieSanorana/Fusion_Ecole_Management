<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">

    <div th:if="${successMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;color:#065f46;">
      <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div class="page-header">
      <div>
        <h2>Réinscription</h2>
        <p>Réinscrire un élève existant pour la nouvelle année scolaire</p>
      </div>
    </div>

    <!-- Étape 1 : Rechercher un élève existant -->
    <div class="card" style="max-width:800px;margin-bottom:var(--sp-lg);">
      <div class="card-header"><h3><i class="fas fa-search"></i> Rechercher l'élève à réinscrire</h3></div>
      <div class="card-body">
        <form th:action="@{/secretariat/reinscription}" method="get" id="searchForm">
          <div style="display:flex;gap:var(--sp-md);align-items:flex-end;">
            <div class="form-group" style="flex:1;">
              <label>Matricule, nom ou prénom</label>
              <input type="text" name="search" class="form-control" th:value="${search}" placeholder="Tapez un matricule, nom…" />
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-search"></i> Rechercher
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Résultats de recherche -->
    <div th:if="${search != null and !search.isEmpty()}">
      <div class="card" style="max-width:800px;" th:if="${#lists.isEmpty(resultats)}">
        <div class="card-body" style="text-align:center;padding:var(--sp-xl);color:var(--txt3);">
          <i class="fas fa-user-slash" style="font-size:48px;display:block;margin-bottom:var(--sp-md);opacity:0.4;"></i>
          Aucun élève trouvé pour "<strong th:text="${search}"></strong>".
        </div>
      </div>

      <div class="card" style="max-width:800px;" th:unless="${#lists.isEmpty(resultats)}">
        <div class="card-header"><h3>Résultats (<span th:text="${#lists.size(resultats)}"></span> élève(s))</h3></div>
        <div class="card-body" style="padding:0;">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="background:var(--surface2);">
                <th style="padding:10px 16px;text-align:left;">Matricule</th>
                <th style="padding:10px 16px;text-align:left;">Nom</th>
                <th style="padding:10px 16px;text-align:left;">Prénom</th>
                <th style="padding:10px 16px;text-align:center;">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="e, stat : ${resultats}" th:style="${stat.odd ? 'background:var(--surface2)' : ''}">
                <td style="padding:10px 16px;font-family:var(--font-mono);" th:text="${e.matricule}"></td>
                <td style="padding:10px 16px;font-weight:500;" th:text="${e.nom}"></td>
                <td style="padding:10px 16px;" th:text="${e.prenom}"></td>
                <td style="padding:10px 16px;text-align:center;">
                  <form th:action="@{/secretariat/reinscription/effectuer}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="etudiantId" th:value="${e.id}"/>
                    <select name="classeId" class="form-control" style="display:inline-block;width:160px;padding:6px 8px;font-size:12px;margin-right:8px;" required>
                      <option value="">— Classe —</option>
                      <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.nom}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">
                      <i class="fas fa-redo"></i> Réinscrire
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div th:if="${search == null or search.isEmpty()}" class="card" style="max-width:800px;">
      <div class="card-body" style="text-align:center;padding:var(--sp-xl);color:var(--txt3);">
        <i class="fas fa-redo" style="font-size:48px;display:block;margin-bottom:var(--sp-md);opacity:0.3;"></i>
        <p>Saisissez un matricule, un nom ou un prénom pour rechercher un élève à réinscrire.</p>
      </div>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
