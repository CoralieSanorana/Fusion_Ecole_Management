<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar" th:replace="~{fragments/header :: topbar}"></header>
  <main class="main-content">

    <!-- Flash messages -->
    <div th:if="${successMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;color:#065f46;">
      <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" style="margin-bottom:var(--sp-md);padding:var(--sp-md);background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div class="page-header">
      <div>
        <h2>Liste des Élèves</h2>
        <p th:text="'Année scolaire active – ' + ${#lists.size(eleves)} + ' élève(s) trouvé(s)'"></p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-warning" onclick="openModal('modal-reinscription-search')">
          <i class="fas fa-user-check"></i> Réinscription
        </button>
        <button class="btn btn-primary" onclick="openModal('modal-add-eleve')">
          <i class="fas fa-plus"></i> Nouvel élève
        </button>
      </div>
    </div>

    <!-- Filtres niveau + recherche -->
    <div style="display:flex;gap:var(--sp-md);margin-bottom:var(--sp-lg);flex-wrap:wrap;align-items:center;">
      <div class="filter-pills">
        <a th:href="@{/secretariat/eleves}"
           th:class="${niveauActif == null and classeIdActif == null and search == null} ? 'pill active' : 'pill'">Tous</a>
        <a th:href="@{/secretariat/eleves(niveau='Seconde')}"
           th:class="${niveauActif == 'Seconde'} ? 'pill active' : 'pill'">Seconde</a>
        <a th:href="@{/secretariat/eleves(niveau='Première')}"
           th:class="${niveauActif == 'Première'} ? 'pill active' : 'pill'">1ère</a>
        <a th:href="@{/secretariat/eleves(niveau='Terminale')}"
           th:class="${niveauActif == 'Terminale'} ? 'pill active' : 'pill'">Terminale</a>
      </div>
      <form th:action="@{/secretariat/eleves}" method="get"
            style="display:flex;gap:var(--sp-sm);margin-left:auto;align-items:center;">
        <select name="classeId" class="form-control" style="width:auto;padding:8px 12px;font-size:13px;"
                onchange="this.form.submit()">
          <option value="">Toutes les salles</option>
          <option th:each="c : ${classes}"
                  th:value="${c.id}"
                  th:text="${c.nom}"
                  th:selected="${classeIdActif == c.id}"></option>
        </select>
        <input type="text" name="search" class="form-control"
               placeholder="Matricule, nom, classe…"
               th:value="${search}"
               style="width:220px;"/>
        <button type="submit" class="btn btn-secondary" style="padding:8px 14px;">
          <i class="fas fa-search"></i>
        </button>
      </form>
    </div>

    <!-- Tableau -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Élève</th>
              <th>Classe</th>
              <th>Janv.</th><th>Fév.</th><th>Mars</th><th>Avr.</th>
              <th>Mai</th><th>Juin</th><th>Juil.</th><th>Août</th>
              <th>Sept.</th><th>Oct.</th><th>Nov.</th><th>Déc.</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(eleves)}">
              <td colspan="15" style="text-align:center;color:var(--txt3);padding:var(--sp-xl);">
                Aucun élève trouvé.
              </td>
            </tr>
            <!-- Boucle sur les élèves -->
            <tr th:each="e : ${eleves}">
              <!-- Avatar + Nom -->
              <td>
                <div style="display:flex;align-items:center;gap:var(--sp-md);">
                  <div th:if="${e.photoUrl == null}"
                       class="avatar-placeholder"
                       style="width:32px;height:32px;background:linear-gradient(135deg,var(--g),var(--b));font-size:12px;"
                       th:text="${e.initiales}"></div>
                  <img th:if="${e.photoUrl != null}"
                       th:src="${e.photoUrl}"
                       style="width:32px;height:32px;border-radius:50%;object-fit:cover;" alt="photo"/>
                  <span th:text="${e.prenom + ' ' + e.nom}"></span>
                </div>
              </td>
              <!-- Classe -->
              <td><span class="badge badge-navy" th:text="${e.nomClasse ?: '—'}"></span></td>
              
              <!-- Mois 1 à 12 : correction avec th:block -->
              <td>
                <th:block th:with="p=${e.paiementsMois.get(1)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(2)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(3)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(4)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(5)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(6)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(7)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(8)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(9)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(10)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(11)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              <td>
                <th:block th:with="p=${e.paiementsMois.get(12)}">
                  <span th:if="${p}" class="badge badge-green">✓</span>
                  <span th:unless="${p}" class="badge badge-red">✗</span>
                </th:block>
              </td>
              
              <!-- Action -->
              <td>
                <a th:href="@{/secretariat/profil/{id}(id=${e.id})}"
                   class="btn btn-sm btn-secondary">Profil</a>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Pagination -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 5px;">
          <!-- Bouton Précédent -->
          <a th:if="${hasPrevious}" 
             th:href="@{/secretariat/eleves(page=${currentPage - 1}, niveau=${niveauActif}, classeId=${classeIdActif}, search=${search})}"
             class="btn btn-primary">
            ← Précédent
          </a>
          <span th:unless="${hasPrevious}" class="btn btn-primary" style="opacity: 0.5; cursor: not-allowed;">
            ← Précédent
          </span>

          <!-- Affichage de la page actuelle -->
          <span style="font-weight: bold; font-size: 14px;">
            Page <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span>
          </span>

          <!-- Bouton Suivant -->
          <a th:if="${hasNext}" 
             th:href="@{/secretariat/eleves(page=${currentPage + 1}, niveau=${niveauActif}, classeId=${classeIdActif}, search=${search})}"
             class="btn btn-primary">
            Suivant →
          </a>
          <span th:unless="${hasNext}" class="btn btn-primary" style="opacity: 0.5; cursor: not-allowed;">
            Suivant →
          </span>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Modal Ajouter Élève -->
<div class="modal-backdrop" id="modal-add-eleve">
  <div class="modal">
    <div class="modal-header">
      <h3>Nouvel Élève</h3>
      <button onclick="closeModal('modal-add-eleve')" style="color:var(--txt3);font-size:18px;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <form action="/secretariat/eleves/ajouter" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" class="form-control" placeholder="Miora" required/>
          </div>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" class="form-control" placeholder="Andria" required/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date de naissance</label>
            <input type="date" name="dateNaissance" class="form-control"/>
          </div>
          <div class="form-group">
            <label>Classe</label>
            <select name="classeId" class="form-control">
              <option value="">— Choisir —</option>
              <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.nom}"></option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nom du parent/tuteur</label>
            <input type="text" name="nomParent" class="form-control" placeholder="Andria Pierre"/>
          </div>
          <div class="form-group">
            <label>Prénom parent</label>
            <input type="text" name="prenomParent" class="form-control" placeholder="Pierre"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Contact parent</label>
            <input type="tel" name="telephoneParent" class="form-control" placeholder="034 XX XXX XX"/>
          </div>
          <div class="form-group">
            <label>Quartier</label>
            <input type="text" name="commune" class="form-control" placeholder="Tsaralalàna"/>
          </div>
        </div>
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" name="adresse" class="form-control" placeholder="Lot 24, …"/>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add-eleve')">Annuler</button>
        <button type="submit" class="btn btn-primary">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Recherche & Réinscription -->
<div class="modal-backdrop" id="modal-reinscription-search">
  <div class="modal">
    <div class="modal-header">
      <h3>Réinscription Élève</h3>
      <button onclick="closeModal('modal-reinscription-search')" style="color:var(--txt3);font-size:18px;">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <form id="form-search-eleve" autocomplete="off">
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label>Recherche (nom, prénom, matricule, téléphone)</label>
            <input type="text" id="rechercheEleve" class="form-control" placeholder="Ex: RAKOTO ou ETU2024" />
          </div>
          <div class="form-group" style="width:120px;align-self:flex-end;">
            <button class="btn btn-secondary" type="submit">Rechercher</button>
          </div>
        </div>
      </form>

      <div id="search-results" style="margin-top:12px;"></div>

      <form id="form-reinscription" action="/secretariat/reinscription" method="post" style="display:none;margin-top:12px;">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
        <input type="hidden" name="etudiantId" id="re_etudiantId" />
        <div class="form-row">
          <div class="form-group">
            <label>Élève</label>
            <input type="text" id="re_eleveName" class="form-control" readonly />
          </div>
          <div class="form-group">
            <label>Ancienne classe</label>
            <input type="text" id="re_ancienneClasse" class="form-control" readonly />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>État</label>
            <input type="text" id="re_etatEleve" class="form-control" readonly style="background:#f0f0f0;font-weight:bold;" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nouvelle année scolaire</label>
            <select name="anneeScolaireId" id="re_anneeScolaireId" class="form-control" required>
              <option value="">— Choisir —</option>
              <option th:each="a : ${annees}" th:value="${a.id}" th:text="${a.libelle}" th:selected="${a.estActive}"></option>
            </select>
          </div>
          <div class="form-group">
            <label>Nouvelle classe</label>
            <select name="classeId" id="re_classeId" class="form-control">
              <option value="">— Choisir —</option>
              <option th:each="c : ${classes}"
                      th:value="${c.id}"
                      th:text="${c.nom}"
                      th:data-niveau="${c.niveau != null ? c.niveau.libelle : ''}"
                      th:data-ordre="${c.niveau != null ? c.niveau.ordre : ''}"></option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date de réinscription</label>
            <input type="date" name="dateInscription" id="re_dateInscription" class="form-control" />
          </div>
          <div class="form-group">
            <label>Statut</label>
            <select name="statut" id="re_statut" class="form-control">
              <option value="active">active</option>
              <option value="suspension">suspension</option>
              <option value="exclu">exclu</option>
            </select>
          </div>
        </div>
        <div class="modal-footer" style="margin-top:10px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal('modal-reinscription-search')">Annuler</button>
          <button type="submit" class="btn btn-primary">Valider réinscription</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('form-search-eleve');
    if (form) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        searchEleve();
      });
    }
  });

  function searchEleve(){
    const q = document.getElementById('rechercheEleve').value.trim();
    const target = document.getElementById('search-results');
    if (!q) {
      target.innerHTML = '<div style="color:var(--danger);">Veuillez saisir un nom, prénom, matricule ou téléphone.</div>';
      return;
    }

    target.innerHTML = '<div>Recherche en cours...</div>';
    fetch('/api/secretariat/eleves/search?q=' + encodeURIComponent(q), {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
      .then(async response => {
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'Erreur de recherche');
        }
        return response.json();
      })
      .then(data => {
        if (!data || data.length === 0) {
          target.innerHTML = '<div>Aucun résultat trouvé.</div>';
          return;
        }

        const list = document.createElement('div');
        data.forEach(it => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn';
          btn.style.margin = '6px';
          btn.textContent = (it.prenom || '') + ' ' + (it.nom || '') + ' — ' + (it.matricule || '');
          btn.onclick = () => selectEleveForReinscription(it);
          list.appendChild(btn);
        });
        target.innerHTML = '';
        target.appendChild(list);
      })
      .catch(err => {
        console.error(err);
        target.innerHTML = '<div style="color:var(--danger);">Recherche impossible. Vérifiez la session ou réessayez.</div>';
      });
  }

  let allClasseOptions = [];

  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('form-search-eleve');
    if (form) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        searchEleve();
      });
    }
    const classeSelect = document.getElementById('re_classeId');
    if (classeSelect) {
      allClasseOptions = Array.from(classeSelect.querySelectorAll('option'))
        .filter(opt => opt.value)
        .map(opt => {
          const ordreAttr = opt.getAttribute('data-ordre');
          return {
            value: opt.value,
            text: opt.textContent,
            niveau: opt.getAttribute('data-niveau') || '',
            ordre: ordreAttr ? parseInt(ordreAttr, 10) : null
          };
        });
      console.log('Classes chargées:', allClasseOptions);
    }
  });

  function renderClasseOptions(options) {
    const select = document.getElementById('re_classeId');
    if (!select) return;
    select.innerHTML = '<option value="">— Choisir —</option>';
    options.forEach(opt => {
      const option = document.createElement('option');
      option.value = opt.value;
      option.textContent = opt.text;
      option.setAttribute('data-niveau', opt.niveau || '');
      if (opt.ordre != null) {
        option.setAttribute('data-ordre', opt.ordre);
      }
      select.appendChild(option);
    });
  }

  function getNiveauOrder(niveau) {
    if (!niveau) return null;
    const normalized = niveau.toLowerCase().trim();
    if (normalized.includes('seconde')) return 1;
    if (normalized.includes('premi') || normalized.includes('1ère') || normalized.includes('1ere')) return 2;
    if (normalized.includes('term')) return 3;
    return null;
  }

  function selectEleveForReinscription(it){
    console.log('Sélection élève:', it);
    
    document.getElementById('form-reinscription').style.display = 'block';
    document.getElementById('re_etudiantId').value = it.id;
    document.getElementById('re_eleveName').value = (it.prenom || '') + ' ' + (it.nom || '');
    document.getElementById('re_ancienneClasse').value = it.nomClasse || '—';
    
    // Afficher l'état (admis ou redouble)
    let etat = 'État inconnu';
    if (it.estAdmis === true) {
      etat = '✓ Admis';
    } else if (it.estAdmis === false) {
      etat = '✗ Redoublant';
    }
    document.getElementById('re_etatEleve').value = etat;
    
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('re_dateInscription').value = today;

    const filteredOptions = filterClasseOptions(it);
    console.log('Options filtrées:', filteredOptions);
    renderClasseOptions(filteredOptions);
    document.getElementById('re_classeId').value = '';
  }

  function filterClasseOptions(it) {
    console.log('Filtrage - estAdmis:', it.estAdmis, 'niveauLibelle:', it.niveauLibelle, 'nomClasse:', it.nomClasse);
    
    if (!allClasseOptions.length || !it.nomClasse) {
      console.log('Pas d\'options ou pas d\'ancienne classe, retour toutes les options');
      return allClasseOptions;
    }
    
    const currentNiveau = getNiveauOrder(it.niveauLibelle || it.nomClasse);
    console.log('Niveau actuel détecté:', currentNiveau, 'à partir de:', it.niveauLibelle || it.nomClasse);
    
    if (currentNiveau == null) {
      console.log('Niveau non reconnu');
      return allClasseOptions;
    }
    
    if (it.estAdmis === true) {
      console.log('Étudiant admis - affichage classes niveau >', currentNiveau);
      return allClasseOptions.filter(opt => {
        const matches = opt.ordre > currentNiveau;
        console.log('Option:', opt.text, 'ordre:', opt.ordre, 'matches:', matches);
        return matches;
      });
    } else if (it.estAdmis === false) {
      console.log('Étudiant redouble - affichage classes niveau =', currentNiveau);
      return allClasseOptions.filter(opt => {
        const matches = opt.ordre === currentNiveau;
        console.log('Option:', opt.text, 'ordre:', opt.ordre, 'matches:', matches);
        return matches;
      });
    }
    console.log('État d’admission inconnu, affichage toutes les classes possibles');
    return allClasseOptions;
  }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
