<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Ajouter un Paiement</h2>
        <p>Enregistrer un nouveau paiement d'écolage</p>
      </div>
    </div>

    <div th:if="${error}"
         style="background:#f8d7da;color:#721c24;padding:12px 16px;border-radius:8px;margin-bottom:16px;">
      <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>

    <div th:if="${warning}"
         style="background:#fff3cd;color:#856404;padding:12px 16px;border-radius:8px;margin-bottom:16px;">
      <i class="fas fa-info-circle"></i> <span th:text="${warning}"></span>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header"><h3>Nouveau paiement</h3></div>
        <div class="card-body">
          <form th:action="@{/secretariat/paiement}" method="post" id="formPaiement">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="inscriptionId" id="hiddenInscriptionId"/>
 
            <!-- Filtre par classe (taper + scroller) -->
            <div class="form-group">
              <label>Filtrer par classe</label>
              <input type="text" class="form-control" id="classeFilter" list="classesList"
                     placeholder="Tapez ou scrollez pour choisir une classe..."
                     autocomplete="off" oninput="filtrerElevesParClasse()" />
              <datalist id="classesList">
                <option value="Toutes les classes">Toutes les classes</option>
                <option th:each="c : ${classes}" th:value="${c.nom}" th:data-id="${c.id}"></option>
              </datalist>
            </div>

            <!-- Sélection élève (taper + sélectionner) -->
            <div class="form-group">
              <label>Élève</label>
              <input type="text" class="form-control" id="eleveInput" list="elevesList"
                     placeholder="Tapez pour rechercher un élève..." oninput="onEleveInput()"
                     autocomplete="off" required/>
              <datalist id="elevesList"></datalist>
            </div>

            <!-- Sélection échéance -->
            <div class="form-group">
              <label>Échéance</label>
              <select class="form-control" name="echeanceId" id="echeanceSelect" required>
                <option value="">— Sélectionner d'abord un élève —</option>
              </select>
            </div>

            <!-- Lignes de paiement -->
            <div class="form-group">
              <label>Modes et montants de paiement</label>
              <div id="lignesPaiement">
                <div class="ligne-paiement"
                     style="display:grid;grid-template-columns:2fr 2fr auto;gap:8px;margin-bottom:8px;">
                  <select class="form-control" name="modesPaiement">
                    <option value="especes">Espèces</option>
                    <option value="virement">Virement</option>
                    <option value="mvola">MVola</option>
                    <option value="orange_money">Orange Money</option>
                    <option value="cheque">Chèque</option>
                  </select>
                  <input type="number" class="form-control montant-input"
                         name="montants" placeholder="Montant (Ar)" min="0"
                         oninput="calculerTotal()" required/>
                  <button type="button" onclick="supprimerLigne(this)"
                          style="background:var(--danger);color:#fff;border:none;border-radius:8px;padding:0 12px;cursor:pointer;font-size:16px;">
                    <i class="fas fa-minus"></i>
                  </button>
                </div>
              </div>
              <button type="button" onclick="ajouterLigne()"
                      style="background:none;border:1px dashed var(--teal);color:var(--teal);
                             border-radius:8px;padding:8px 16px;cursor:pointer;width:100%;margin-top:4px;">
                <i class="fas fa-plus"></i> Ajouter un mode de paiement
              </button>
            </div>

            <!-- Total dynamique -->
            <div style="background:var(--surface2);border-radius:8px;padding:12px 16px;
                        display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
              <span style="color:var(--txt3);font-size:13px;">Total</span>
              <strong id="totalAffiche" style="font-size:18px;color:var(--teal);">0 Ar</strong>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
              <i class="fas fa-save"></i> Enregistrer le paiement
            </button>
          </form>
        </div>
      </div>

      <!-- Panneau info échéance -->
      <div class="card">
        <div class="card-header"><h3>Détail de l'échéance</h3></div>
        <div class="card-body" id="echeanceDetail">
          <p style="color:var(--txt3);text-align:center;margin-top:2rem;">
            Sélectionnez un élève pour voir ses échéances.
          </p>
        </div>
      </div>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
/*<![CDATA[*/
// Stocker toutes les inscriptions en mémoire pour filtrage dynamique
window.allInscriptions = [];
/*]]>*/
</script>
<script th:each="insc : ${inscriptions}" th:inline="javascript">
/*<![CDATA[*/
window.allInscriptions.push({
    id: [[${insc.id}]],
    label: /*[[${insc.etudiant.nom + ' ' + insc.etudiant.prenom}]]*/ '',
    classeNom: /*[[${insc.classe.nom}]]*/ '',
    classeId: [[${insc.classe.id}]]
});
/*]]>*/
</script>

<script th:inline="javascript">
function filtrerElevesParClasse() {
    const classeInput = document.getElementById('classeFilter');
    const classeNom = classeInput.value.trim();
    let classeId = null;

    // Résoudre le nom de classe en ID
    if (classeNom && classeNom !== 'Toutes les classes') {
        const datalistClasse = document.getElementById('classesList');
        for (let opt of datalistClasse.options) {
            if (opt.value === classeNom) {
                classeId = opt.getAttribute('data-id');
                break;
            }
        }
    }

    const datalist = document.getElementById('elevesList');
    datalist.innerHTML = '';

    window.allInscriptions.forEach(insc => {
        if (!classeId || !classeNom || classeNom === 'Toutes les classes' || insc.classeId == classeId) {
            const opt = document.createElement('option');
            opt.value = insc.label;
            opt.setAttribute('data-id', insc.id);
            datalist.appendChild(opt);
        }
    });

    // Réinitialiser la sélection de l'élève si elle ne correspond plus au filtre
    const eleveInput = document.getElementById('eleveInput');
    if (eleveInput.value) {
        const selectedInsc = window.allInscriptions.find(i => i.label === eleveInput.value);
        if (selectedInsc && classeId && selectedInsc.classeId != classeId && classeNom !== 'Toutes les classes') {
            eleveInput.value = '';
            onEleveInput();
        }
    }
}

// Appel initial pour peupler la liste avec tous les élèves
filtrerElevesParClasse();

function onEleveInput() {
    const val = document.getElementById('eleveInput').value.trim();
    const hidden = document.getElementById('hiddenInscriptionId');
    const datalist = document.getElementById('elevesList');
    let insc = null;
    for (let option of datalist.options) {
        if (option.value === val) {
            insc = window.allInscriptions.find(i => i.id == option.getAttribute('data-id'));
            break;
        }
    }

    if (insc) {
        hidden.value = insc.id;
        chargerEcheances(insc.id);
    } else {
        hidden.value = '';
        document.getElementById('echeanceSelect').innerHTML = '<option value="">— Sélectionner d\'abord un élève —</option>';
        document.getElementById('echeanceDetail').innerHTML = '<p style="color:var(--txt3);text-align:center;margin-top:2rem;">Sélectionnez un élève pour voir ses échéances.</p>';
    }
}

function ajouterLigne() {
    const container = document.getElementById('lignesPaiement');
    const div = document.createElement('div');
    div.className = 'ligne-paiement';
    div.style = 'display:grid;grid-template-columns:2fr 2fr auto;gap:8px;margin-bottom:8px;';
    div.innerHTML = `
        <select class="form-control" name="modesPaiement">
            <option value="especes">Espèces</option>
            <option value="virement">Virement</option>
            <option value="mvola">MVola</option>
            <option value="orange_money">Orange Money</option>
            <option value="cheque">Chèque</option>
        </select>
        <input type="number" class="form-control montant-input"
               name="montants" placeholder="Montant (Ar)" min="0"
               oninput="calculerTotal()" required/>
        <button type="button" onclick="supprimerLigne(this)"
                style="background:var(--danger);color:#fff;border:none;border-radius:8px;
                       padding:0 12px;cursor:pointer;font-size:16px;">
            <i class="fas fa-minus"></i>
        </button>
    `;
    container.appendChild(div);
}

function supprimerLigne(btn) {
    const lignes = document.querySelectorAll('.ligne-paiement');
    if (lignes.length === 1) return;
    btn.closest('.ligne-paiement').remove();
    calculerTotal();
}

function calculerTotal() {
    const inputs = document.querySelectorAll('.montant-input');
    let total = 0;
    inputs.forEach(i => { total += parseFloat(i.value) || 0; });
    document.getElementById('totalAffiche').textContent =
        total.toLocaleString('fr-FR') + ' Ar';
}

function chargerEcheances(inscriptionId) {
    if (!inscriptionId) return;
    fetch('/secretariat/paiement/echeances?inscriptionId=' + inscriptionId)
    .then(r => r.json())
    .then(echeances => {
        const select = document.getElementById('echeanceSelect');
        const detail = document.getElementById('echeanceDetail');
        select.innerHTML = '<option value="">— Sélectionner une échéance —</option>';
        detail.innerHTML = '';

        if (echeances.length === 0) {
            select.innerHTML = '<option value="">Aucune échéance ouverte</option>';
            detail.innerHTML = '<p style="color:green;text-align:center;margin-top:2rem;">✔ Toutes les échéances sont soldées.</p>';
            return;
        }

        echeances.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.id;
            opt.text = 'Tranche ' + e.numeroTranche + ' — '
                + Number(e.montantAttendu).toLocaleString('fr-FR')
                + ' Ar (limite : ' + e.dateLimite + ')';
            select.appendChild(opt);
        });

        if (echeances.length > 0) {
            afficherDetail(echeances[0]);
        }

        select.onchange = () => {
            const sel = echeances.find(e => e.id == select.value);
            afficherDetail(sel);
        };
    });
}

function afficherDetail(e) {
    document.getElementById('echeanceDetail').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:1rem;">
            ${!e ? `<p style="color:var(--txt3);text-align:center;">Sélectionnez une échéance pour voir les détails.</p>` : `
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Tranche</span>
                <strong>${e.numeroTranche}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Montant attendu</span>
                <strong>${Number(e.montantAttendu).toLocaleString('fr-FR')} Ar</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Date limite</span>
                <strong>${e.dateLimite}</strong>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--txt3);">Statut</span>
                <strong style="color:${e.estSoldee ? 'green' : 'orange'}">
                    ${e.estSoldee ? '✔ Soldée' : '⏳ En attente'}
                </strong>
            </div>`
            }
        </div>`;
}
</script>
</body>
</html>
