<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div>
            <h2 th:text="${classe != null ? 'Bulletins — ' + classe.nom : 'Bulletins'}">Bulletins</h2>
            <p th:text="${classe != null ? 'Classe dont vous êtes titulaire' : 'Aucune classe assignée'}">Classe dont vous êtes titulaire</p>
        </div>
        
        <div class="page-header-actions" th:if="${classe != null}">
            <button class="btn btn-primary" 
                    th:data-classe-nom="${classe.nom}"
                    onclick="showToast('Bulletins publiés pour ' + this.getAttribute('data-classe-nom') + ' !')">
                <i class="fas fa-share"></i> Publier les bulletins
            </button>
        </div>
    </div>
    
    <div th:if="${classe == null}" class="card">
        <div class="card-body">
            <p style="text-align:center;color:var(--txt3);padding:40px;">
                Vous n'êtes pas titulaire d'une classe pour l'année scolaire actuelle.
            </p>
        </div>
    </div>
    
    <div th:if="${classe != null}" class="card">
        <div class="card-header">
            <h3>Liste des Élèves — <span th:text="${classe.nom}">Classe</span></h3>
        </div>
        <!-- Filters -->
        <div class="card-body" style="padding-bottom:0;">
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
            <input type="text" id="filter-nom" placeholder="Filtrer par nom" class="form-control" style="flex:1;min-width:200px;">
            <input type="text" id="filter-prenom" placeholder="Filtrer par prénom" class="form-control" style="flex:1;min-width:200px;">
            <input type="text" id="filter-etu" placeholder="Filtrer par matricule" class="form-control" style="flex:1;min-width:200px;">
            <button type="button" onclick="clearFilters()" class="btn btn-secondary">
              <i class="fas fa-times"></i> Effacer
            </button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="bulletinsTable">
            <thead>
              <tr>
                <th style="cursor: pointer; user-select: none;" onclick="sortBulletinsTable(0, false)">
                  Élève <i class="fas fa-sort text-muted ms-1"></i>
                </th>
                <th style="cursor: pointer; user-select: none;" onclick="sortBulletinsTable(1, false)">
                  Matricule <i class="fas fa-sort text-muted ms-1"></i>
                </th>
                <th style="cursor: pointer; user-select: none;" onclick="sortBulletinsTable(2, false)">
                  Classe <i class="fas fa-sort text-muted ms-1"></i>
                </th>
                <th style="text-align: center;">Action</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr th:each="inscription : ${inscriptions}" class="data-row"
                  th:data-nom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom : ''}"
                  th:data-prenom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).prenom : ''}"
                  th:data-etu="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">
                <td>
                  <strong class="student-text" th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom + ' ' + etudiantProfiles.get(inscription.etudiantId).prenom : 'Étudiant'}">Nom Prénom</strong>
                </td>
                <td>
                  <span class="student-matricule" th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">MAT-1234</span>
                </td>
                <td>
                  <span class="student-classe" th:text="${classe != null ? classe.nom : 'Classe'}">Seconde A</span>
                </td>
                <td style="text-align: center;">
                  <a th:href="@{/professeur/bulletin/{etudiantId}(etudiantId=${inscription.etudiantId})}" class="btn btn-sm btn-primary">
                    <i class="fas fa-eye"></i> Voir le Bulletin
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="pagination" style="margin-top:20px;display:flex;justify-content:center;align-items:center;gap:10px;">
          <button type="button" onclick="changePage(-1)" class="btn btn-secondary" id="prev-btn" disabled>
            <i class="fas fa-chevron-left"></i> Précédent
          </button>
          <span id="page-info">Page 1 sur 1</span>
          <button type="button" onclick="changePage(1)" class="btn btn-secondary" id="next-btn" disabled>
            Suivant <i class="fas fa-chevron-right"></i>
          </button>
        </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
let currentPage = 1;
const itemsPerPage = 10;
let filteredRows = [];
let currentSortCol = -1;
let sortAscending = true;

function filterTable() {
    const nomFilter = document.getElementById('filter-nom').value.toLowerCase();
    const prenomFilter = document.getElementById('filter-prenom').value.toLowerCase();
    const etuFilter = document.getElementById('filter-etu').value.toLowerCase();
    
    const rows = document.querySelectorAll('.data-row');
    filteredRows = [];
    
    rows.forEach(row => {
        const nom = row.dataset.nom ? row.dataset.nom.toLowerCase() : '';
        const prenom = row.dataset.prenom ? row.dataset.prenom.toLowerCase() : '';
        const etu = row.dataset.etu ? row.dataset.etu.toLowerCase() : '';
        
        const matchesNom = !nomFilter || nom.includes(nomFilter);
        const matchesPrenom = !prenomFilter || prenom.includes(prenomFilter);
        const matchesEtu = !etuFilter || etu.includes(etuFilter);
        
        if (matchesNom && matchesPrenom && matchesEtu) {
            filteredRows.push(row);
        }
    });
    
    currentPage = 1;
    updatePagination();
}

function updatePagination() {
    const rows = document.querySelectorAll('.data-row');
    rows.forEach(row => row.style.display = 'none');
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    
    for (let i = start; i < end && i < filteredRows.length; i++) {
        filteredRows[i].style.display = '';
    }
    
    const totalPages = Math.ceil(filteredRows.length / itemsPerPage) || 1;
    document.getElementById('page-info').textContent = `Page ${currentPage} sur ${totalPages}`;
    
    document.getElementById('prev-btn').disabled = currentPage === 1;
    document.getElementById('next-btn').disabled = currentPage === totalPages;
}

function changePage(delta) {
    currentPage += delta;
    updatePagination();
}

function clearFilters() {
    document.getElementById('filter-nom').value = '';
    document.getElementById('filter-prenom').value = '';
    document.getElementById('filter-etu').value = '';
    filterTable();
}

function sortBulletinsTable(columnIndex, isNumeric = false) {
    const table = document.getElementById("bulletinsTable");
    if (!table) return;

    const tbody = table.querySelector("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));

    if (currentSortCol === columnIndex) {
        sortAscending = !sortAscending;
    } else {
        sortAscending = true;
        currentSortCol = columnIndex;
    }

    const headers = table.querySelectorAll("thead th");
    headers.forEach((th, idx) => {
        const icon = th.querySelector("i");
        if (icon) {
            if (idx === columnIndex) {
                icon.className = sortAscending ? "fas fa-sort-up text-primary ms-1" : "fas fa-sort-down text-primary ms-1";
            } else {
                icon.className = "fas fa-sort text-muted ms-1";
            }
        }
    });

    rows.sort((rowA, rowB) => {
        let elA = rowA.cells[columnIndex];
        let elB = rowB.cells[columnIndex];

        if (columnIndex === 0) { elA = elA.querySelector('.student-text'); elB = elB.querySelector('.student-text'); }
        else if (columnIndex === 1) { elA = elA.querySelector('.student-matricule'); elB = elB.querySelector('.student-matricule'); }
        else if (columnIndex === 2) { elA = elA.querySelector('.student-classe'); elB = elB.querySelector('.student-classe'); }

        const txtA = elA ? elA.innerText.trim().toLowerCase() : rowA.cells[columnIndex].innerText.trim().toLowerCase();
        const txtB = elB ? elB.innerText.trim().toLowerCase() : rowB.cells[columnIndex].innerText.trim().toLowerCase();

        if (isNumeric) {
            let valA = parseFloat(txtA) || 0;
            let valB = parseFloat(txtB) || 0;
            return sortAscending ? (valA - valB) : (valB - valA);
        } else {
            return sortAscending ? txtA.localeCompare(txtB) : txtB.localeCompare(txtA);
        }
    });

    rows.forEach(row => tbody.appendChild(row));
}

document.addEventListener('DOMContentLoaded', function() {
    const nomFilter = document.getElementById('filter-nom');
    const prenomFilter = document.getElementById('filter-prenom');
    const etuFilter = document.getElementById('filter-etu');
    
    if (nomFilter) {
        nomFilter.addEventListener('input', filterTable);
    }
    if (prenomFilter) {
        prenomFilter.addEventListener('input', filterTable);
    }
    if (etuFilter) {
        etuFilter.addEventListener('input', filterTable);
    }
    
    const rows = document.querySelectorAll('.data-row');
    filteredRows = Array.from(rows);
    updatePagination();
});
</script>

</body>
</html>
