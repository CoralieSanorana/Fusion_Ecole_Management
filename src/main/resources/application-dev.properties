# ========== PROFILE: DEV (Development Local) ==========
# Solution pour éviter les erreurs de connexion PostgreSQL avec Hibernate 6
# Configuration optimisée pour développement local

# ========= 1. HIBERNATE SCHEMA MANAGEMENT (DÉSACTIVÉ) ==========
# ddl-auto=none: Aucune modification de schéma
# hbm2ddl.auto=none: Alias pour ddl-auto en Hibernate 5.x compat
spring.jpa.hibernate.ddl-auto=none

# ========= 2. JPA / SQL INITIALIZATION ==========
# Désactiver l'initialisation SQL et la déférenciation des données sources
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ========= 3. HIKARICP CONNECTION POOL ==========
# Timeouts optimisés pour l'inspection du schéma Hibernate
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# ========= 4. HIBERNATE LOGGING (Réduit) ==========
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.boot.autoconfigure.orm.jpa=INFO

# ========= 5. THYMELEAF ==========
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
