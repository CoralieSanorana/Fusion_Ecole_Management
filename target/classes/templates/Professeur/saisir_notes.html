<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div>
          <h2>Saisir des Notes</h2>
          <p th:text="${classe != null and matiere != null ? classe.nom + ' - ' + matiere.nom : 'Saisie de notes'}">Classe - Matière</p>
        </div>
        <div class="page-header-actions">
          <a th:href="@{/professeur/notes/classe/{classeId}(classeId=${classeId})}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Retour
          </a>
        </div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <h3>Informations de l'évaluation</h3>
      </div>
      <div class="card-body">
        <form th:action="@{/professeur/saisir_notes}" method="post" id="notesForm">
          <input type="hidden" name="affectationId" th:value="${affectationId}"/>
          <input type="hidden" name="classeId" th:value="${classeId}"/>
          
          <div class="form-row">
            <div class="form-group">
              <label>Type d'évaluation *</label>
              <select name="typeEvaluation" class="form-control" required>
                <option value="">Sélectionner...</option>
                <option value="devoir_1">Devoir 1</option>
                <option value="devoir_2">Devoir 2</option>
                <option value="interrogation">Interrogation</option>
                <option value="composition">Composition</option>
                <option value="examen_blanc">Examen blanc</option>
                <option value="oral">Oral</option>
                <option value="tp">TP</option>
              </select>
            </div>
            <div class="form-group">
              <label>Période *</label>
              <select name="periodeId" class="form-control" required>
                <option value="">Sélectionner...</option>
                <option th:each="periode : ${periodes}" 
                        th:value="${periode.id}" 
                        th:text="${periode.libelle}">Période</option>
              </select>
            </div>
            <div class="form-group">
              <label>Barème *</label>
              <input type="number" name="sur" class="form-control" value="20" min="1" required step="0.5"/>
            </div>
          </div>
          
          <div class="form-group">
            <label>Commentaire (optionnel)</label>
            <textarea name="commentaire" class="form-control" rows="2" placeholder="Commentaire général sur l'évaluation..."></textarea>
          </div>
          
          <!-- Submit buttons moved to top -->
          <div class="form-actions" style="margin-bottom: 20px;">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Enregistrer les notes
            </button>
            <a th:href="@{/professeur/notes/classe/{classeId}(classeId=${classeId})}" class="btn btn-secondary">
              Annuler
            </a>
          </div>
          
          <div class="card" style="margin-top: 20px;">
            <div class="card-header">
              <h3>Notes des élèves</h3>
            </div>
            <!-- Filters -->
            <div class="card-body" style="padding-bottom:0;">
              <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
                <input type="text" id="filter-nom" placeholder="Filtrer par nom ou prénom" class="form-control" style="flex:1;min-width:200px;">
                <input type="text" id="filter-matricule" placeholder="Filtrer par matricule" class="form-control" style="flex:1;min-width:200px;">
                <button type="button" onclick="clearFilters()" class="btn btn-secondary">
                  <i class="fas fa-times"></i> Effacer
                </button>
              </div>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Élève</th>
                    <th>Matricule</th>
                    <th>Note *</th>
                  </tr>
                </thead>
                <tbody id="students-table-body">
                  <tr th:each="inscription : ${inscriptions}" class="student-row"
                      th:data-nom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom : ''}"
                      th:data-prenom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).prenom : ''}"
                      th:data-matricule="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">
                    <td>
                      <strong th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom + ' ' + etudiantProfiles.get(inscription.etudiantId).prenom : 'Étudiant'}">Nom Prénom</strong>
                    </td>
                    <td th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">Matricule</td>
                    <td>
                      <input type="hidden" 
                             th:name="'etudiantIds'" 
                             th:value="${inscription.etudiantId}"/>
                      <input type="number" 
                             th:name="'valeurs'" 
                             class="form-control" 
                             min="0" 
                             step="0.5"
                             placeholder="Note"
                             style="width:100px;padding:6px;text-align:center;"/>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <!-- Pagination -->
            <div class="pagination" style="margin-top:20px;display:flex;justify-content:center;align-items:center;gap:10px;">
              <button type="button" onclick="changePage(-1)" class="btn btn-secondary" id="prev-btn" disabled>
                <i class="fas fa-chevron-left"></i> Précédent
              </button>
              <span id="page-info">Page 1 sur 1</span>
              <button type="button" onclick="changePage(1)" class="btn btn-secondary" id="next-btn" disabled>
                Suivant <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
// Filter and Pagination
let currentPage = 1;
const itemsPerPage = 10;
let filteredRows = [];

function filterTable() {
    const nomFilter = document.getElementById('filter-nom').value.toLowerCase();
    const matriculeFilter = document.getElementById('filter-matricule').value.toLowerCase();
    const rows = document.querySelectorAll('.student-row');
    
    filteredRows = [];
    rows.forEach(row => {
        const nom = row.dataset.nom.toLowerCase();
        const prenom = row.dataset.prenom.toLowerCase();
        const matricule = row.dataset.matricule.toLowerCase();
        
        const matchesNom = !nomFilter || nom.includes(nomFilter) || prenom.includes(nomFilter);
        const matchesMatricule = !matriculeFilter || matricule.includes(matriculeFilter);
        
        if (matchesNom && matchesMatricule) {
            filteredRows.push(row);
        }
    });
    
    currentPage = 1;
    updatePagination();
}

function updatePagination() {
    const rows = document.querySelectorAll('.student-row');
    rows.forEach(row => row.style.display = 'none');
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    
    for (let i = start; i < end && i < filteredRows.length; i++) {
        filteredRows[i].style.display = '';
    }
    
    const totalPages = Math.ceil(filteredRows.length / itemsPerPage) || 1;
    document.getElementById('page-info').textContent = `Page ${currentPage} sur ${totalPages}`;
    
    document.getElementById('prev-btn').disabled = currentPage === 1;
    document.getElementById('next-btn').disabled = currentPage === totalPages;
}

function changePage(delta) {
    currentPage += delta;
    updatePagination();
}

function clearFilters() {
    document.getElementById('filter-nom').value = '';
    document.getElementById('filter-matricule').value = '';
    filterTable();
}

// Initialize filters and pagination
document.addEventListener('DOMContentLoaded', function() {
    const nomFilter = document.getElementById('filter-nom');
    const matriculeFilter = document.getElementById('filter-matricule');
    
    if (nomFilter) {
        nomFilter.addEventListener('input', filterTable);
    }
    if (matriculeFilter) {
        matriculeFilter.addEventListener('input', filterTable);
    }
    
    // Initialize with all rows
    const rows = document.querySelectorAll('.student-row');
    filteredRows = Array.from(rows);
    updatePagination();
});

document.getElementById('notesForm').addEventListener('submit', function(e) {
  const notes = document.querySelectorAll('input[name="valeurs"]');
  let hasValue = false;
  
  notes.forEach(note => {
    if (note.value && note.value.trim() !== '') {
      hasValue = true;
    }
  });
  
  if (!hasValue) {
    e.preventDefault();
    alert('Veuillez saisir au moins une note.');
  }
});
</script>
</body>
</html>
