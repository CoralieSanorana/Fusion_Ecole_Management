<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
    <div class="page-header">
        <div>
            <h2 th:text="${classe != null ? 'Bulletins — ' + classe.nom : 'Bulletins'}">Bulletins</h2>
            <p th:text="${classe != null ? 'Classe dont vous êtes titulaire' : 'Aucune classe assignée'}">Classe dont vous êtes titulaire</p>
        </div>
        
        <div class="page-header-actions" th:if="${classe != null}">
            <button class="btn btn-primary" 
                    th:data-classe-nom="${classe.nom}"
                    onclick="showToast('📋 Bulletins publiés pour ' + this.getAttribute('data-classe-nom') + ' !')">
                <i class="fas fa-share"></i> Publier les bulletins
            </button>
        </div>
    </div>
    
    <div th:if="${classe == null}" class="card">
        <div class="card-body">
            <p style="text-align:center;color:var(--txt3);padding:40px;">
                Vous n'êtes pas titulaire d'une classe pour l'année scolaire actuelle.
            </p>
        </div>
    </div>
    
    <div th:if="${classe != null}" class="card">
        <div class="card-header">
            <h3>Liste des Élèves — <span th:text="${classe.nom}">Classe</span></h3>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Matricule</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Action</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr th:if="${inscriptions == null or inscriptions.isEmpty()}">
                        <td colspan="5" style="text-align:center;color:var(--txt3);padding:20px;">
                            Aucun élève inscrit dans cette classe.
                        </td>
                    </tr>
                    <tr th:each="inscription : ${inscriptions}" 
                        th:onclick="|window.location.href='/professeur/bulletin/${inscription.etudiantId}'|"
                        style="cursor:pointer;">
                        <td th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">Matricule</td>
                        <td th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom : 'Étudiant'}">Nom</td>
                        <td th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).prenom : ''}">Prénom</td>
                        <td>
                            <a th:href="@{/professeur/bulletin/{etudiantId}(etudiantId=${inscription.etudiantId})}" 
                            class="btn btn-primary btn-sm">
                                <i class="fas fa-file-alt"></i> Voir bulletin
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
