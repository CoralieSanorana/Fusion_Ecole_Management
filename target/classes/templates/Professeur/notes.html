<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
<style>
@media print {
  body * {
    visibility: hidden;
  }
  #print-area, #print-area * {
    visibility: visible;
  }
  #print-area {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    padding: 20px;
  }
  .card-header, .form-actions, .pagination, #filter-nom, #filter-matricule, 
  #filter-note-min, #filter-note-max, #notesSearchInput, #matiereSelect,
  .card-body button, .card-body input, .card-body select, .sidebar, .topbar,
  #particle-canvas, .page-header, .card-body {
    display: none !important;
  }
}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" id="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content" id="main-content">
    <div class="page-header">
        <div><h2>Notes des Élèves</h2><p>Saisie et gestion des notes</p></div>
      </div>
      
      <!-- Section: Liste des classes -->
      <div class="card" th:if="${inscriptions == null}">
        <div class="card-header">
          <h3>Mes Classes</h3>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Classe</th>
                <th>Matière</th>
                <th>Heures/semaine</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="affectation : ${affectations}">
                <td th:text="${classeNames.get(affectation.classeId)}">Classe</td>
                <td th:text="${matiereNames.get(affectation.matiereId)}">Matière</td>
                <td th:text="${affectation.heuresHebdo}">Heures</td>
                <td>
                  <a th:href="@{/professeur/notes/classe/{classeId}(classeId=${affectation.classeId})}" class="btn btn-primary btn-sm">
                    Voir les élèves
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Section: Liste des étudiants et notes -->
      <div class="card" th:if="${inscriptions != null}">
        <div class="card-header">
          <div>
            <h3 th:text="${classe != null ? classe.nom : 'Classe'}">Classe</h3>
            <a href="/professeur/notes" class="btn btn-secondary" style="margin-top: 10px;">
              <i class="fas fa-arrow-left"></i> Retour aux classes
            </a>
          </div>
        </div>

        <!-- Filters -->
        <div class="card-body" style="padding-bottom:0;">
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
            <input type="text" id="filter-nom" placeholder="Filtrer par nom ou prénom" class="form-control" style="flex:1;min-width:200px;">
            <input type="text" id="filter-matricule" placeholder="Filtrer par matricule" class="form-control" style="flex:1;min-width:200px;">
            <input type="number" id="filter-note-min" placeholder="Note min" class="form-control" style="flex:1;min-width:150px;" min="0" step="0.5">
            <input type="number" id="filter-note-max" placeholder="Note max" class="form-control" style="flex:1;min-width:150px;" min="0" step="0.5">
            <button type="button" onclick="clearStudentFilters()" class="btn btn-secondary">
              <i class="fas fa-times"></i> Effacer
            </button>
          </div>
        </div>
        
        <div style="padding: 15px; border-bottom: 1px solid var(--border-color, #eef2f5);">
          <div style="display: flex; gap: 10px; max-width: 500px;">
            <input type="text" id="notesSearchInput" class="form-control" 
                   placeholder="Rechercher un élève (Nom, prénom, matricule)..." 
                   style="flex: 1; padding: 8px 12px;" onkeyup="filterNotesTable()">
          </div>
        </div>
        
        <div>
          <select id="matiereSelect" class="form-control" style="width:auto;padding:8px 12px;" onchange="filterByMatiere()">
            <option value="">Toutes les matières</option>
            <option th:each="affectation : ${affectations}" 
                    th:if="${affectation.classeId == classeId}"
                    th:value="${affectation.matiereId}" 
                    th:text="${matiereNames.get(affectation.matiereId)}">Matière</option>
          </select>
          <a th:each="affectation : ${affectations}" 
             th:if="${affectation.classeId == classeId}"
             th:href="@{/professeur/saisir_notes/{classeId}/{affectationId}(classeId=${classeId}, affectationId=${affectation.id})}"
             class="btn btn-primary" style="margin-left: 10px;">
            <i class="fas fa-plus"></i> Saisir des notes
          </a>
          <a th:href="@{/professeur/notes/classe/{classeId}/pdf(classeId=${classeId})}" class="btn btn-secondary" style="margin-left: 10px;">
            <i class="fas fa-file-pdf"></i> Export PDF
          </a>
        </div>
      </div>
  
      <div id="print-area">
        <div class="table-wrapper">
          <table id="summaryNotesTable">
          <thead>
            <tr>
              <th style="cursor: pointer; user-select: none;" onclick="sortSummaryTable(0, false)">
                Élève <i class="fas fa-sort text-muted ms-1"></i>
              </th>
              <th th:each="type, status : ${evaluationTypes}" 
                  style="cursor: pointer; user-select: none; text-align: center;" 
                  th:onclick="'sortSummaryTable(' + ${status.count} + ', true)'">
                <span th:text="${#strings.replace(type, '_', ' ').toUpperCase()}">Type d'évaluation</span>
                <i class="fas fa-sort text-muted ms-1"></i>
              </th>
            </tr>
          </thead>
          <tbody id="students-table-body">
            <tr th:each="inscription : ${inscriptions}" class="student-row"
                th:data-nom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom : ''}"
                th:data-prenom="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).prenom : ''}"
                th:data-matricule="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">
              <td>
                <strong class="student-text" th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).nom + ' ' + etudiantProfiles.get(inscription.etudiantId).prenom : 'Étudiant'}">Nom Prénom</strong>
                <br/>
                <small class="student-matricule" th:text="${etudiantProfiles.get(inscription.etudiantId) != null ? etudiantProfiles.get(inscription.etudiantId).matricule : ''}">Matricule</small>
              </td>
              <td th:each="type : ${evaluationTypes}" 
                  style="text-align: center;"
                  th:data-note="${etudiantNotesByType.get(inscription.etudiantId) != null && etudiantNotesByType.get(inscription.etudiantId).get(type) != null ? etudiantNotesByType.get(inscription.etudiantId).get(type).valeur : '-1'}">
                <span th:if="${etudiantNotesByType.get(inscription.etudiantId) != null && etudiantNotesByType.get(inscription.etudiantId).get(type) != null}"
                      th:text="${etudiantNotesByType.get(inscription.etudiantId).get(type).valeur} + '/' + ${etudiantNotesByType.get(inscription.etudiantId).get(type).sur}">Note</span>
                <span th:if="${etudiantNotesByType.get(inscription.etudiantId) == null || etudiantNotesByType.get(inscription.etudiantId).get(type) == null}" 
                      style="color:var(--txt3);">-</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      </div>
  
      <!-- Pagination for students -->
      <div th:if="${inscriptions != null}" class="pagination" style="margin-top:20px;display:flex;justify-content:center;align-items:center;gap:10px;">
        <button type="button" onclick="changeStudentPage(-1)" class="btn btn-secondary" id="student-prev-btn" disabled>
          <i class="fas fa-chevron-left"></i> Précédent
        </button>
        <span id="student-page-info">Page 1 sur 1</span>
        <button type="button" onclick="changeStudentPage(1)" class="btn btn-secondary" id="student-next-btn" disabled>
          Suivant <i class="fas fa-chevron-right"></i>
        </button>
      </div>
  
      <div th:if="${inscriptions != null}" style="text-align: center; color: var(--txt3); padding: 15px 0; font-size: 0.9em; border-top: 1px solid var(--border-color, #eef2f5);">
        Total : <span id="visibleRowsCount" th:text="${#lists.size(inscriptions)}">0</span> élève(s) affiché(s)
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
let currentSortCol = -1;
let sortAscending = true;

// Student filters and pagination
let currentStudentPage = 1;
const studentItemsPerPage = 10;
let filteredStudentRows = [];

function filterStudentTable() {
    const nomFilterEl = document.getElementById('filter-nom');
    const matriculeFilterEl = document.getElementById('filter-matricule');
    const noteMinEl = document.getElementById('filter-note-min');
    const noteMaxEl = document.getElementById('filter-note-max');
    
    if (!nomFilterEl || !matriculeFilterEl || !noteMinEl || !noteMaxEl) return;
    
    const nomFilter = nomFilterEl.value.toLowerCase();
    const matriculeFilter = matriculeFilterEl.value.toLowerCase();
    const noteMin = parseFloat(noteMinEl.value) || 0;
    const noteMax = parseFloat(noteMaxEl.value) || Infinity;
    
    const rows = document.querySelectorAll('.student-row');
    filteredStudentRows = [];
    
    rows.forEach(row => {
        const nom = row.dataset.nom.toLowerCase();
        const prenom = row.dataset.prenom.toLowerCase();
        const matricule = row.dataset.matricule.toLowerCase();
        
        const matchesNom = !nomFilter || nom.includes(nomFilter) || prenom.includes(nomFilter);
        const matchesMatricule = !matriculeFilter || matricule.includes(matriculeFilter);
        
        // Check if any note falls within the range by looking at data-note attributes in cells
        let matchesNote = !noteMin && !noteMax;
        if (!matchesNote) {
            const noteCells = row.querySelectorAll('td[data-note]');
            matchesNote = Array.from(noteCells).some(cell => {
                const noteValue = parseFloat(cell.dataset.note);
                if (isNaN(noteValue) || noteValue < 0) return false;
                return noteValue >= noteMin && noteValue <= noteMax;
            });
        }
        
        if (matchesNom && matchesMatricule && matchesNote) {
            filteredStudentRows.push(row);
        }
    });
    
    currentStudentPage = 1;
    updateStudentPagination();
}

function updateStudentPagination() {
    const rows = document.querySelectorAll('.student-row');
    rows.forEach(row => row.style.display = 'none');
    
    const start = (currentStudentPage - 1) * studentItemsPerPage;
    const end = start + studentItemsPerPage;
    
    for (let i = start; i < end && i < filteredStudentRows.length; i++) {
        filteredStudentRows[i].style.display = '';
    }
    
    const totalPages = Math.ceil(filteredStudentRows.length / studentItemsPerPage) || 1;
    const pageInfo = document.getElementById('student-page-info');
    if (pageInfo) {
        pageInfo.textContent = `Page ${currentStudentPage} sur ${totalPages}`;
    }
    
    const prevBtn = document.getElementById('student-prev-btn');
    const nextBtn = document.getElementById('student-next-btn');
    if (prevBtn) prevBtn.disabled = currentStudentPage === 1;
    if (nextBtn) nextBtn.disabled = currentStudentPage === totalPages;
}

function changeStudentPage(delta) {
    currentStudentPage += delta;
    updateStudentPagination();
}

function clearStudentFilters() {
    const nomFilter = document.getElementById('filter-nom');
    const matriculeFilter = document.getElementById('filter-matricule');
    const noteMin = document.getElementById('filter-note-min');
    const noteMax = document.getElementById('filter-note-max');
    
    if (nomFilter) nomFilter.value = '';
    if (matriculeFilter) matriculeFilter.value = '';
    if (noteMin) noteMin.value = '';
    if (noteMax) noteMax.value = '';
    filterStudentTable();
}

function exportPDF() {
    window.print();
}

function filterNotesTable() {
    const input = document.getElementById("notesSearchInput");
    const filter = input.value.toLowerCase().trim();
    const table = document.getElementById("summaryNotesTable");
    if (!table) return;
    
    const rows = table.querySelector("tbody").querySelectorAll("tr");
    let visibleCount = 0;

    rows.forEach(row => {
        const nameText = row.querySelector(".student-text") ? row.querySelector(".student-text").innerText.toLowerCase() : "";
        const matriculeText = row.querySelector(".student-matricule") ? row.querySelector(".student-matricule").innerText.toLowerCase() : "";

        if (nameText.includes(filter) || matriculeText.includes(filter)) {
            row.style.display = "";
            visibleCount++;
        } else {
            row.style.display = "none";
        }
    });

    const countSpan = document.getElementById("visibleRowsCount");
    if (countSpan) countSpan.innerText = visibleCount;
}

function sortSummaryTable(columnIndex, isNumeric = false) {
    const table = document.getElementById("summaryNotesTable");
    if (!table) return;
    
    const tbody = table.querySelector("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));
    
    if (currentSortCol === columnIndex) {
        sortAscending = !sortAscending;
    } else {
        sortAscending = true;
        currentSortCol = columnIndex;
    }

    const headers = table.querySelectorAll("thead th");
    headers.forEach((th, idx) => {
        const icon = th.querySelector("i");
        if (icon) {
            if (idx === columnIndex) {
                icon.className = sortAscending ? "fas fa-sort-up text-primary ms-1" : "fas fa-sort-down text-primary ms-1";
            } else {
                icon.className = "fas fa-sort text-muted ms-1";
            }
        }
    });

    rows.sort((rowA, rowB) => {
        if (isNumeric) {
            const cellA = rowA.cells[columnIndex];
            const cellB = rowB.cells[columnIndex];
            
            let valA = cellA ? parseFloat(cellA.getAttribute('data-note')) : -1;
            let valB = cellB ? parseFloat(cellB.getAttribute('data-note')) : -1;
            
            if (isNaN(valA)) valA = -1;
            if (isNaN(valB)) valB = -1;

            return sortAscending ? (valA - valB) : (valB - valA);
        } else {
            const elA = rowA.cells[columnIndex].querySelector('.student-text');
            const elB = rowB.cells[columnIndex].querySelector('.student-text');
            
            const txtA = elA ? elA.innerText.trim().toLowerCase() : rowA.cells[columnIndex].innerText.trim().toLowerCase();
            const txtB = elB ? elB.innerText.trim().toLowerCase() : rowB.cells[columnIndex].innerText.trim().toLowerCase();
            
            return sortAscending ? txtA.localeCompare(txtB) : txtB.localeCompare(txtA);
        }
    });

    rows.forEach(row => tbody.appendChild(row));
}

// Initialize student filters and pagination
document.addEventListener('DOMContentLoaded', function() {
    // Student filters
    const nomFilter = document.getElementById('filter-nom');
    const matriculeFilter = document.getElementById('filter-matricule');
    const noteMin = document.getElementById('filter-note-min');
    const noteMax = document.getElementById('filter-note-max');
    
    if (nomFilter) {
        nomFilter.addEventListener('input', filterStudentTable);
    }
    if (matriculeFilter) {
        matriculeFilter.addEventListener('input', filterStudentTable);
    }
    if (noteMin) {
        noteMin.addEventListener('input', filterStudentTable);
    }
    if (noteMax) {
        noteMax.addEventListener('input', filterStudentTable);
    }
    
    // Initialize student rows only if they exist
    const studentRows = document.querySelectorAll('.student-row');
    if (studentRows.length > 0) {
        filteredStudentRows = Array.from(studentRows);
        updateStudentPagination();
    }
});
</script>
</body>
</html>
