<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" th:replace="fragments/header :: sidebar"></aside>
  <header class="topbar" th:replace="fragments/header :: topbar"></header>
  <main class="main-content">
        <div class="page-header">
            <div>
                <h2>Supports de Cours & Devoirs</h2>
                <p>Gérez vos publications par classe</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Mes Classes Assignées</h3>
            </div>
            <!-- Filters -->
            <div class="card-body" style="padding-bottom:0;">
              <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
                <select id="filter-classe" class="form-control" style="flex:1;min-width:200px;">
                  <option value="">Toutes les classes</option>
                  <option th:each="classeName : ${classeNames.values()}" 
                          th:value="${classeName}" 
                          th:text="${classeName}">Classe</option>
                </select>
                <select id="filter-matiere" class="form-control" style="flex:1;min-width:200px;">
                  <option value="">Toutes les matières</option>
                  <option th:each="matiereName : ${matiereNames.values()}" 
                          th:value="${matiereName}" 
                          th:text="${matiereName}">Matière</option>
                </select>
                <button type="button" onclick="clearFilters()" class="btn btn-secondary">
                  <i class="fas fa-times"></i> Effacer
                </button>
              </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Classe</th>
                            <th>Matière</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr th:each="aff : ${affectations}" class="data-row"
                            th:data-classe="${classeNames.get(aff.classeId)}"
                            th:data-matiere="${matiereNames.get(aff.matiereId)}">
                            <td th:text="${classeNames.get(aff.classeId)}">Classe</td>
                            <td th:text="${matiereNames.get(aff.matiereId)}">Matière</td>
                            <td>
                                <a th:href="@{/professeur/devoirs/details(affectationId=${aff.id})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-folder-open"></i> Voir supports
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="pagination" style="margin-top:20px;display:flex;justify-content:center;align-items:center;gap:10px;">
              <button type="button" onclick="changePage(-1)" class="btn btn-secondary" id="prev-btn" disabled>
                <i class="fas fa-chevron-left"></i> Précédent
              </button>
              <span id="page-info">Page 1 sur 1</span>
              <button type="button" onclick="changePage(1)" class="btn btn-secondary" id="next-btn" disabled>
                Suivant <i class="fas fa-chevron-right"></i>
              </button>
            </div>
        </div>
  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
let currentPage = 1;
const itemsPerPage = 10;
let filteredRows = [];

function filterTable() {
    const classeFilter = document.getElementById('filter-classe').value.toLowerCase();
    const matiereFilter = document.getElementById('filter-matiere').value.toLowerCase();
    
    const rows = document.querySelectorAll('.data-row');
    filteredRows = [];
    
    rows.forEach(row => {
        const classe = row.dataset.classe ? row.dataset.classe.toLowerCase() : '';
        const matiere = row.dataset.matiere ? row.dataset.matiere.toLowerCase() : '';
        
        const matchesClasse = !classeFilter || classe.includes(classeFilter);
        const matchesMatiere = !matiereFilter || matiere.includes(matiereFilter);
        
        if (matchesClasse && matchesMatiere) {
            filteredRows.push(row);
        }
    });
    
    currentPage = 1;
    updatePagination();
}

function updatePagination() {
    const rows = document.querySelectorAll('.data-row');
    rows.forEach(row => row.style.display = 'none');
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    
    for (let i = start; i < end && i < filteredRows.length; i++) {
        filteredRows[i].style.display = '';
    }
    
    const totalPages = Math.ceil(filteredRows.length / itemsPerPage) || 1;
    document.getElementById('page-info').textContent = `Page ${currentPage} sur ${totalPages}`;
    
    document.getElementById('prev-btn').disabled = currentPage === 1;
    document.getElementById('next-btn').disabled = currentPage === totalPages;
}

function changePage(delta) {
    currentPage += delta;
    updatePagination();
}

function clearFilters() {
    document.getElementById('filter-classe').value = '';
    document.getElementById('filter-matiere').value = '';
    filterTable();
}

document.addEventListener('DOMContentLoaded', function() {
    const classeFilter = document.getElementById('filter-classe');
    const matiereFilter = document.getElementById('filter-matiere');
    
    if (classeFilter) {
        classeFilter.addEventListener('change', filterTable);
    }
    if (matiereFilter) {
        matiereFilter.addEventListener('change', filterTable);
    }
    
    const rows = document.querySelectorAll('.data-row');
    filteredRows = Array.from(rows);
    updatePagination();
});
</script>
</body>
</html>
