<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>

<body>
<canvas id="particle-canvas"></canvas>

<div class="app-shell">

  <aside class="sidebar" id="sidebar" th:replace="~{fragments/header :: sidebar}"></aside>
  <header class="topbar" th:replace="~{fragments/header :: topbar}"></header>

  <main class="main-content">

    <div class="page-header">
      <div>
        <h2>Supports de cours</h2>
        <p>Devoirs et leçons publiés par vos professeurs</p>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:var(--sp-md);">

      <!-- EMPTY STATE -->
      <div th:if="${supports.isEmpty()}"
           style="color:var(--txt2);font-style:italic;padding:8px 0 16px 14px;">
        Aucun support publié pour le moment.
      </div>

      <!-- SUPPORT LIST -->
      <div class="support-card" th:each="support : ${supports}">

        <!-- PROF + MATIERE -->
        <h4 th:text="${support.affectation?.professeur?.prenom + ' ' + support.affectation?.professeur?.nom}">
          Professeur
        </h4>

        <h4 th:text="${support.affectation?.matiere?.nom}">
          Matière
        </h4>

        <!-- TYPE (devoir / leçon / autre) -->
        <span class="badge"
              th:text="${support.typeContenu}">
          type
        </span>

        <!-- TITRE -->
        <h4 th:text="${support.titre}">
          Titre
        </h4>

        <!-- DATE LIMITE (si devoir) -->
        <div class="due" th:if="${support.dateLimite != null}">
          📅 À rendre :
          <span th:text="${support.dateLimite}">
            Date limite
          </span>
        </div>

        <!-- DESCRIPTION -->
        <p th:text="${support.description}">
          Description
        </p>

        <!-- CONTENU / FICHIER -->
        <div th:if="${support.fichierUrl != null}">
          📎 <a th:href="${support.fichierUrl}" target="_blank">
            Télécharger le fichier
          </a>
        </div>

      </div>

    </div>
  </main>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
